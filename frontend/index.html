<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VESPERA — Considered Objects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ===================== DESIGN TOKENS ===================== */
:root{
  --ink:#15110F;
  --ink-soft:#221C19;
  --surface:#2A2220;
  --surface-soft:#352B27;
  --ivory:#F6EFE4;
  --ivory-dim:#EDE3D3;
  --beige:#E8DCC8;
  --burgundy:#5C1A23;
  --burgundy-bright:#7A2330;
  --copper:#B87A4B;
  --copper-bright:#D49A6A;
  --copper-dim:#8C6240;
  --line:rgba(246,239,228,0.10);
  --line-strong:rgba(246,239,228,0.18);
  --text-dim:rgba(246,239,228,0.58);
  --text-faint:rgba(246,239,228,0.36);

  --font-display:'Fraunces', serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'JetBrains Mono', monospace;

  --radius-sm:6px;
  --radius-md:12px;
  --radius-lg:20px;
  --ease:cubic-bezier(.16,1,.3,1);
}

/* Light mode overrides */
[data-theme="light"]{
  --ink:#F6EFE4;
  --ink-soft:#EDE3D3;
  --surface:#FFFCF6;
  --surface-soft:#FBF5EA;
  --ivory:#15110F;
  --ivory-dim:#221C19;
  --beige:#3A2F2A;
  --line:rgba(21,17,15,0.10);
  --line-strong:rgba(21,17,15,0.18);
  --text-dim:rgba(21,17,15,0.62);
  --text-faint:rgba(21,17,15,0.40);
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--ink);
  color:var(--ivory);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.5;
  overflow-x:hidden;
  transition:background .4s var(--ease), color .4s var(--ease);
}
::selection{background:var(--copper);color:var(--ink);}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
img{display:block;max-width:100%;}
.serif{font-family:var(--font-display);}
.mono{font-family:var(--font-mono);}

::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--ink);}
::-webkit-scrollbar-thumb{background:var(--surface-soft);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--copper-dim);}

/* Reduced motion respect */
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
}

/* Focus visibility */
a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible{
  outline:2px solid var(--copper-bright);
  outline-offset:3px;
  border-radius:4px;
}

/* ===================== UTILITY ===================== */
.app{min-height:100vh;display:flex;flex-direction:column;}
.container{max-width:1320px;margin:0 inline-size;margin-inline:auto;padding:0 40px;}
@media (max-width:900px){.container{padding:0 22px;}}

.glass{
  background:linear-gradient(155deg, rgba(246,239,228,0.07), rgba(246,239,228,0.02));
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--line);
}
[data-theme="light"] .glass{
  background:linear-gradient(155deg, rgba(255,255,255,0.6), rgba(255,255,255,0.25));
}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 28px;border-radius:999px;font-size:13px;font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;
  transition:transform .35s var(--ease), box-shadow .35s var(--ease), background .35s var(--ease), color .35s var(--ease), border-color .35s var(--ease);
  white-space:nowrap;
}
.btn-primary{
  background:linear-gradient(155deg, var(--copper-bright), var(--copper-dim));
  color:var(--ink);
  box-shadow:0 8px 24px -8px rgba(184,122,75,0.5);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 30px -8px rgba(184,122,75,0.65);}
.btn-primary:active{transform:translateY(0px) scale(.98);}
.btn-ghost{
  border:1px solid var(--line-strong);
  color:var(--ivory);
  background:rgba(246,239,228,0.02);
}
.btn-ghost:hover{border-color:var(--copper);background:rgba(184,122,75,0.08);}
.btn-dark{
  background:var(--ink);
  color:var(--ivory);
  border:1px solid var(--line-strong);
}
.btn-sm{padding:10px 18px;font-size:11.5px;}
.btn-lg{padding:18px 36px;font-size:14px;}
.btn-block{width:100%;}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none !important;}
.btn-icon{
  width:42px;height:42px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  border:1px solid var(--line-strong);
  transition:transform .3s var(--ease), border-color .3s var(--ease), background .3s var(--ease);
}
.btn-icon:hover{border-color:var(--copper);background:rgba(184,122,75,0.1);transform:translateY(-1px);}

.eyebrow{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--copper-bright);
  display:flex;align-items:center;gap:10px;
}
.eyebrow::before{content:'';width:18px;height:1px;background:var(--copper-bright);}

.divider{height:1px;background:var(--line);border:none;width:100%;}

.badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:999px;
  font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  font-family:var(--font-mono);
}
.badge-copper{background:rgba(184,122,75,0.16);color:var(--copper-bright);border:1px solid rgba(184,122,75,0.3);}
.badge-burgundy{background:rgba(122,35,48,0.22);color:#E8919E;border:1px solid rgba(122,35,48,0.4);}
.badge-ivory{background:rgba(246,239,228,0.08);color:var(--ivory);border:1px solid var(--line-strong);}
.badge-success{background:rgba(120,160,110,0.14);color:#9FC79A;border:1px solid rgba(120,160,110,0.3);}

/* fade/scale page transition */
.view{animation:viewIn .5s var(--ease);}
@keyframes viewIn{
  from{opacity:0; transform:translateY(14px);}
  to{opacity:1; transform:translateY(0);}
}
.view-exit{animation:viewOut .25s var(--ease) forwards;}
@keyframes viewOut{
  to{opacity:0; transform:translateY(-8px);}
}

/* skeleton-alternative premium loader: woven thread */
.loader-wrap{
  position:fixed;inset:0;z-index:9999;
  background:var(--ink);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:24px;
  transition:opacity .6s var(--ease), visibility .6s;
}
.loader-mark{
  width:64px;height:64px;position:relative;
}
.loader-mark svg{width:100%;height:100%;}
.loader-ring{
  fill:none;stroke:var(--copper);stroke-width:1.4;
  stroke-dasharray:8 6;
  animation:loaderSpin 2.2s linear infinite;
  transform-origin:center;
}
.loader-core{
  fill:none;stroke:var(--ivory);stroke-width:1;opacity:.5;
  stroke-dasharray:200;
  animation:loaderDraw 1.8s var(--ease) infinite alternate;
}
@keyframes loaderSpin{to{transform:rotate(360deg);}}
@keyframes loaderDraw{from{stroke-dashoffset:200;} to{stroke-dashoffset:0;}}
.loader-text{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--text-dim);
}

/* toast / notification */
.toast-stack{
  position:fixed;top:90px;right:24px;z-index:8000;
  display:flex;flex-direction:column;gap:10px;
  width:340px;
}
@media (max-width:600px){.toast-stack{right:14px;left:14px;width:auto;top:80px;}}
.toast{
  padding:16px 18px;border-radius:var(--radius-md);
  display:flex;align-items:flex-start;gap:12px;
  animation:toastIn .45s var(--ease);
  box-shadow:0 20px 40px -16px rgba(0,0,0,.5);
}
@keyframes toastIn{
  from{opacity:0; transform:translateX(40px) scale(.95);}
  to{opacity:1; transform:translateX(0) scale(1);}
}
.toast.leaving{animation:toastOut .35s var(--ease) forwards;}
@keyframes toastOut{to{opacity:0; transform:translateX(40px) scale(.95);}}
.toast-icon{
  width:34px;height:34px;border-radius:50%;flex:none;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;
}
.toast-title{font-size:13.5px;font-weight:700;margin-bottom:2px;}
.toast-msg{font-size:12.5px;color:var(--text-dim);line-height:1.4;}
.toast-close{margin-left:auto;flex:none;opacity:.5;font-size:18px;line-height:1;}
.toast-close:hover{opacity:1;}

/* Modal/drawer overlay */
.overlay{
  position:fixed;inset:0;z-index:7000;
  background:rgba(10,8,7,0.7);
  backdrop-filter:blur(6px);
  display:flex;
  opacity:0;visibility:hidden;
  transition:opacity .4s var(--ease), visibility .4s;
}
.overlay.open{opacity:1;visibility:visible;}
.drawer{
  margin-left:auto;height:100%;width:min(440px, 92vw);
  background:var(--surface);
  border-left:1px solid var(--line-strong);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .5s var(--ease);
}
.overlay.open .drawer{transform:translateX(0);}
.modal-center{
  margin:auto;width:min(480px, 92vw);
  background:var(--surface);
  border:1px solid var(--line-strong);
  border-radius:var(--radius-lg);
  transform:scale(.94) translateY(10px);
  transition:transform .4s var(--ease);
  max-height:88vh;overflow-y:auto;
}
.overlay.open .modal-center{transform:scale(1) translateY(0);}

/* Form elements */
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:18px;}
.field label{font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-dim);}
.field input, .field select, .field textarea{
  background:rgba(246,239,228,0.04);
  border:1px solid var(--line-strong);
  border-radius:var(--radius-sm);
  padding:13px 15px;
  color:var(--ivory);
  font-family:var(--font-body);
  font-size:14px;
  transition:border-color .3s var(--ease), background .3s var(--ease);
}
[data-theme="light"] .field input, [data-theme="light"] .field select, [data-theme="light"] .field textarea{
  background:rgba(21,17,15,0.03);
}
.field input:focus, .field select:focus, .field textarea:focus{
  border-color:var(--copper);
  background:rgba(184,122,75,0.06);
  outline:none;
}
.field-hint{font-size:11.5px;color:var(--text-faint);}
.field-error{font-size:11.5px;color:#E8919E;}
.field.has-error input{border-color:#7A2330;}
.checkbox-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-dim);}
.checkbox-row input{accent-color:var(--copper);width:16px;height:16px;}

/* Cards */
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  transition:border-color .35s var(--ease), transform .35s var(--ease), box-shadow .35s var(--ease);
}

/* Scroll reveal */
.reveal{opacity:0; transform:translateY(24px); transition:opacity .8s var(--ease), transform .8s var(--ease);}
.reveal.in{opacity:1; transform:translateY(0);}

a, button, input, select{-webkit-tap-highlight-color:transparent;}

/* ===================== RESPONSIVE ===================== */
@media (min-width: 901px){
  .auth-visual{display:block !important;}
  .auth-mobile-logo{display:none;}
}
@media (max-width: 900px){
  .nav-desktop{display:none;}
  .nav-burger{display:inline-flex;}
  #hero-grid{grid-template-columns:1fr !important;min-height:auto !important;gap:40px !important;}
  .hero-visual{height:380px !important;order:-1;}
  .cat-grid{grid-template-columns:repeat(2,1fr) !important;}
  .product-grid{grid-template-columns:repeat(2,1fr) !important;}
  .product-grid-3{grid-template-columns:repeat(2,1fr) !important;}
  .about-grid{grid-template-columns:1fr !important;}
  .catalog-grid{grid-template-columns:1fr !important;}
  .catalog-filters{order:2;border-top:1px solid var(--line);padding-top:24px;margin-top:24px;}
  .pdp-grid{grid-template-columns:1fr !important;gap:32px !important;}
  .reviews-grid{grid-template-columns:1fr !important;gap:24px !important;}
  .cart-page-grid{grid-template-columns:1fr !important;}
  .dash-grid{grid-template-columns:1fr !important;}
  .addr-grid{grid-template-columns:1fr !important;}
  .footer-grid{grid-template-columns:1fr 1fr !important;gap:32px !important;}
  .admin-sidebar{position:fixed;left:0;top:0;bottom:0;z-index:400;transform:translateX(-100%);transition:transform .4s var(--ease);}
  .admin-sidebar.open{transform:translateX(0);}
  .admin-stat-grid{grid-template-columns:repeat(2,1fr) !important;}
  .admin-chart-row{grid-template-columns:1fr !important;}
  .promo-grid{grid-template-columns:1fr !important;}
  .qv-grid{grid-template-columns:1fr !important;}
  .qv-grid img{border-radius:var(--radius-lg) var(--radius-lg) 0 0 !important;min-height:220px !important;}
}
@media (max-width: 600px){
  .cat-grid{grid-template-columns:1fr 1fr !important;gap:12px !important;}
  .product-grid{grid-template-columns:1fr 1fr !important;gap:14px !important;}
  .product-grid-3{grid-template-columns:1fr 1fr !important;gap:14px !important;}
  .footer-grid{grid-template-columns:1fr !important;}
  .admin-stat-grid{grid-template-columns:1fr 1fr !important;}
  .nav-login{display:none;}
  h1.serif{word-break:break-word;}
}
@media (max-width: 420px){
  .cat-grid, .product-grid, .product-grid-3{grid-template-columns:1fr !important;}
}
</style>
</head>

/* ===================== API LAYER ===================== */
const API_BASE = 'http://localhost:8000/api';
const TOKEN_KEY = 'vsp_token';
function getToken(){ return localStorage.getItem(TOKEN_KEY); }
function setToken(t){ if(t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); }

async function apiFetch(path, options={}){
  const headers = Object.assign({'Content-Type':'application/json'}, options.headers||{});
  const token = getToken();
  if(token) headers['Authorization'] = 'Bearer '+token;
  const res = await fetch(API_BASE+path, Object.assign({}, options, {headers}));
  let data = null;
  try{ data = await res.json(); }catch(e){}
  if(!res.ok){
    const message = (data && data.detail) || res.statusText || 'Request failed';
    throw new Error(typeof message==='string' ? message : 'Request failed');
  }
  return data;
}

function normalizeProduct(p){
  return {id:p.id, name:p.name, cat:p.category_id, price:p.price, compareAt:p.compare_at,
    rating:p.rating, reviews:p.reviews_count, tag:p.tag, materials:p.materials, stock:p.stock,
    desc:p.description, specs:p.specs, images:p.images};
}
function normalizeCategory(c){ return {id:c.id, name:c.name, desc:c.description}; }
function normalizePromo(p){ return {id:p.id, code:p.code, type:p.type, value:p.value, uses:p.uses, limit:p.usage_limit, active:p.active, expires:p.expires}; }
function normalizeOrder(o){
  return {id:o.id, date:(o.created_at||'').slice(0,10), status:o.status, total:o.total,
    items:(o.items||[]).map(it=>({pid:it.product_id, qty:it.qty, material:it.material}))};
}
function normalizeAdminUser(u){
  return {id:u.id, name:u.name, email:u.email, role:u.role==='admin'?'Admin':'Customer',
    orders:u.orders_count, spent:u.spent, joined:(u.created_at||'').slice(0,10), status:u.status};
}
function daysAgo(iso){
  const d = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
  return Math.max(0, d);
}
function normalizeReview(r){
  return {id:r.id, name:r.author_name, rating:r.rating, title:r.title, body:r.body, days:daysAgo(r.created_at)};
}

function $(sel, root=document){ return root.querySelector(sel); }
function $all(sel, root=document){ return [...root.querySelectorAll(sel)]; }

function fmt2(n){ return '$' + n.toFixed(2); }

function navigate(view, params={}){

function icon(name, size=18){
  return `<i data-lucide="${name}" style="width:${size}px;height:${size}px;" aria-hidden="true"></i>`;
}

function refreshIcons(){ if(window.lucide) lucide.createIcons(); }

function toast(type, title, msg){
  const id = Date.now() + Math.random();
  State.toasts.push({id,type,title,msg});
  renderToasts();
  setTimeout(()=>dismissToast(id), 4200);
}
function dismissToast(id){
  const el = document.getElementById('toast-'+id);
  if(el){ el.classList.add('leaving'); setTimeout(()=>{ State.toasts = State.toasts.filter(t=>t.id!==id); renderToasts(); }, 300); }
  else { State.toasts = State.toasts.filter(t=>t.id!==id); renderToasts(); }
}
function renderToasts(){
  const stack = document.getElementById('toast-stack');
  const icons = {success:'check-circle', error:'x-circle', info:'info'};
  const colors = {
    success:{accent:'#9FC79A', iconBg:'rgba(120,160,110,0.16)'},
    error:{accent:'#E8919E', iconBg:'rgba(122,35,48,0.2)'},
    info:{accent:'var(--copper-bright)', iconBg:'rgba(184,122,75,0.16)'},
  };
  stack.innerHTML = State.toasts.map(t=>{
    const c = colors[t.type]||colors.info;
    return `<div class="toast glass" id="toast-${t.id}" style="border-color:${c.accent}33;">
      <div class="toast-icon" style="background:${c.iconBg};color:${c.accent};">${icon(icons[t.type]||'info',16)}</div>
      <div style="flex:1;min-width:0;">
        <div class="toast-title">${t.title}</div>
        <div class="toast-msg">${t.msg}</div>
      </div>
      <button class="toast-close" onclick="dismissToast(${t.id})" aria-label="Dismiss">×</button>
    </div>`;
  }).join('');
  refreshIcons();
}

function cartCount(){ return State.cart.reduce((s,i)=>s+i.qty,0); }
function cartSubtotal(){
  return State.cart.reduce((s,i)=>{
    const p = getProduct(i.pid); return s + (p?p.price*i.qty:0);
  },0);
}
function addToCart(pid, material, qty=1){
  const existing = State.cart.find(i=>i.pid===pid && i.material===material);
  if(existing){ existing.qty += qty; } else { State.cart.push({pid,material,qty}); }
  saveCart();
  const p = getProduct(pid);
  toast('success', 'Added to cart', `${p.name} — ${MATERIALS[material].name}`);
  renderCartBadge();
}
function removeFromCart(pid, material){
  State.cart = State.cart.filter(i=>!(i.pid===pid && i.material===material));
  saveCart(); renderCartBadge();
  if(State.view==='cart') renderApp();
}
function updateCartQty(pid, material, qty){
  const item = State.cart.find(i=>i.pid===pid && i.material===material);
  if(item){ item.qty = clamp(qty,1,9); saveCart(); }
  if(State.view==='cart') renderApp();
  renderCartBadge();
}
async function toggleWishlist(pid){
  const idx = State.wishlist.indexOf(pid);
  const p = getProduct(pid);
  const wasSaved = idx>-1;
  if(State.user){
    try{
      const data = wasSaved ? await apiFetch('/wishlist/'+pid, {method:'DELETE'}) : await apiFetch('/wishlist/'+pid, {method:'POST'});
      if(data && Array.isArray(data.product_ids)) State.wishlist = data.product_ids;
      toast(wasSaved?'info':'success', wasSaved?'Removed from wishlist':'Saved to wishlist', p.name);
    }catch(e){ toast('error','Could not update wishlist', e.message); }
  } else {
    if(wasSaved){ State.wishlist.splice(idx,1); toast('info','Removed from wishlist', p.name); }
    else { State.wishlist.push(pid); toast('success','Saved to wishlist', p.name); }
    saveWishlist();
  }
  renderApp();
}
function renderCartBadge(){
  $all('.cart-count').forEach(el=>{
    const n = cartCount();
    el.textContent = n;
    el.style.display = n>0 ? 'flex':'none';

}

function starRow(rating, size=14){
  let html = '';
  for(let i=1;i<=5;i++){
    const fill = rating>=i ? 1 : (rating>i-1 ? rating-(i-1) : 0);
    html += `<span style="position:relative;display:inline-block;width:${size}px;height:${size}px;">
      <span style="position:absolute;inset:0;color:var(--line-strong);">${icon('star',size)}</span>
      <span style="position:absolute;inset:0;width:${fill*100}%;overflow:hidden;color:var(--copper-bright);">${icon('star',size)}</span>
    </span>`;
  }
  return `<span style="display:inline-flex;gap:2px;">${html}</span>`;
}

function initScrollReveal(){
  const items = $all('.reveal');
  if(!items.length) return;
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); obs.unobserve(e.target); } });
  }, {threshold:0.15});
  items.forEach(el=>obs.observe(el));
}

/* ===================== VIEW: CATALOG ===================== */
function getFilteredProducts(){
  let list = [...PRODUCTS];
  const f = State.filters;
  if(f.cat && f.cat!=='all') list = list.filter(p=>p.cat===f.cat);
  if(State.params.sale) list = list.filter(p=>p.compareAt);
  if(f.search) list = list.filter(p=>p.name.toLowerCase().includes(f.search.toLowerCase()));
  if(f.materials.length) list = list.filter(p=>p.materials.some(m=>f.materials.includes(m)));
  list = list.filter(p=>p.price>=f.price[0] && p.price<=f.price[1]);
  switch(f.sort){
    case 'price-asc': list.sort((a,b)=>a.price-b.price); break;
    case 'price-desc': list.sort((a,b)=>b.price-a.price); break;
    case 'rating': list.sort((a,b)=>b.rating-a.rating); break;
    case 'new': list = list.filter(p=>p.tag==='New').concat(list.filter(p=>p.tag!=='New')); break;
    default: break;
  }
  return list;
}

async function applyPromo(){
  const code = $('#promo-input').value.trim().toUpperCase();
  if(!code){ return; }
  try{
    const data = await apiFetch('/promos/validate', {method:'POST', body: JSON.stringify({code})});
    const found = normalizePromo(data);
    State.checkoutData.promo = found;
    toast('success','Promo applied', `${found.code} — ${found.type==='percent'?found.value+'% off':found.type==='fixed'?fmt(found.value)+' off':'free shipping'}`);
  }catch(e){ toast('error','Invalid code', e.message); }
  renderApp();
}

function checkoutNext(){
  if(State.checkoutStep===1){
    const f = {name:$('#ship-name').value, email:$('#ship-email').value, address:$('#ship-address').value, city:$('#ship-city').value, state:$('#ship-state').value, zip:$('#ship-zip').value, method:$('#ship-method').value};
    if(!f.name || !f.email || !f.address){ toast('error','Missing information','Please complete name, email, and address before continuing.'); return; }
    State.checkoutData.shipping = f;
  }
  if(State.checkoutStep===2){
    const f = {card:$('#pay-card').value, exp:$('#pay-exp').value, cvc:$('#pay-cvc').value, name:$('#pay-name').value, save:$('#pay-save').checked};
    if(!f.card || !f.exp || !f.cvc){ toast('error','Missing payment info','Please complete all card fields to continue.'); return; }
    State.checkoutData.payment = f;
  }
  State.checkoutStep++; renderApp();
}
function checkoutBack(){ State.checkoutStep--; renderApp(); }

async function placeOrder(){
  if(!State.user){ toast('error','Sign in required','Please sign in to place an order.'); navigate('login'); return; }
  const items = State.cart.map(i=>({product_id:i.pid, material:i.material, qty:i.qty}));
  const card = (State.checkoutData.payment && State.checkoutData.payment.card) || '';
  const card_last4 = card.replace(/\s/g,'').slice(-4) || null;
  const promo = State.checkoutData.promo;
  try{
    const order = await apiFetch('/orders', {method:'POST', body: JSON.stringify({
      items, shipping: State.checkoutData.shipping, card_last4, promo_code: promo ? promo.code : null,
    })});
    State.lastOrder = {id:order.id, items:[...State.cart], total: order.total};
    ORDERS.unshift(normalizeOrder(order));
    State.cart = []; saveCart();
    State.checkoutStep = 1;
    State.checkoutData.promo = null;
    toast('success','Order placed', `Confirmation ${order.id} sent to your email.`);
    navigate('order-confirm');
  }catch(e){ toast('error','Could not place order', e.message); }
}

function openOrderTracking(orderId){
  const o = ORDERS.find(x=>x.id===orderId);
  const steps = ['Order placed','Processing','Shipped','Out for delivery','Delivered'];
  const statusIdx = {processing:1, shipped:2, delivered:4}[o.status] ?? 1;
  const root = $('#overlay-root');
  const html = `<div id="track-overlay" class="overlay" onclick="if(event.target===this)closeTracking()">
    <div class="modal-center glass" style="width:min(520px,92vw);padding:32px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:24px;">
        <div><div class="mono" style="font-size:13px;color:var(--copper-bright);">${o.id}</div><div style="font-size:13px;color:var(--text-dim);">Placed ${o.date}</div></div>
        <button class="btn-icon" onclick="closeTracking()" aria-label="Close">${icon('x',16)}</button>
      </div>
      <div style="margin-bottom:28px;">
        ${steps.map((s,i)=>`
          <div style="display:flex;gap:14px;">
            <div style="display:flex;flex-direction:column;align-items:center;">
              <div style="width:22px;height:22px;border-radius:50%;background:${i<=statusIdx?'var(--copper-bright)':'var(--surface-soft)'};display:flex;align-items:center;justify-content:center;flex:none;">${i<=statusIdx?icon('check',12):''}</div>
              ${i<steps.length-1?`<div style="width:1.5px;flex:1;background:${i<statusIdx?'var(--copper-bright)':'var(--line-strong)'};min-height:28px;"></div>`:''}
            </div>
            <div style="padding-bottom:24px;"><div style="font-size:13.5px;font-weight:${i<=statusIdx?'600':'400'};color:${i<=statusIdx?'var(--ivory)':'var(--text-faint)'};">${s}</div></div>
          </div>`).join('')}
      </div>
      <div class="card" style="padding:16px;">
        ${o.items.map(it=>{ const p=getProduct(it.pid); return `<div style="display:flex;gap:10px;align-items:center;margin-bottom:8px;"><img src="${p.images[0]}" style="width:34px;height:34px;border-radius:6px;object-fit:cover;"><span style="font-size:12.5px;flex:1;">${p.name}</span><span class="mono" style="font-size:11px;color:var(--text-faint);">×${it.qty}</span></div>`}).join('')}
      </div>
    </div>
  </div>`;
  const existing = document.getElementById('track-overlay'); if(existing) existing.remove();
  root.insertAdjacentHTML('beforeend', html);
  refreshIcons();
  requestAnimationFrame(()=>$('#track-overlay').classList.add('open'));
}

  const el = $('#track-overlay');
  if(el){ el.classList.remove('open'); setTimeout(()=>el.remove(),400); }

async function adminAddProduct(){
  const name = window.prompt('Product name?');
  if(!name) return;
  const category_id = window.prompt('Category id? (' + CATEGORIES.map(c=>c.id).join(', ') + ')', CATEGORIES[0]?.id || '');
  if(!category_id) return;
  const price = parseFloat(window.prompt('Price?', '99'));
  if(!price || price<=0){ toast('error','Invalid price','Enter a valid number.'); return; }
  const stock = parseInt(window.prompt('Stock?', '10'),10) || 0;
  try{
    await apiFetch('/products', {method:'POST', body: JSON.stringify({name, category_id, price, stock})});
    toast('success','Product added', name);
    await loadProductsFromAPI(); renderApp();
  }catch(e){ toast('error','Could not add product', e.message); }
}
async function adminEditProduct(pid){
  const p = getProduct(pid);
  if(!p) return;
  const name = window.prompt('Product name?', p.name);
  if(name===null) return;
  const priceStr = window.prompt('Price?', p.price);
  if(priceStr===null) return;
  const stockStr = window.prompt('Stock?', p.stock);
  if(stockStr===null) return;
  try{
    await apiFetch('/products/'+pid, {method:'PUT', body: JSON.stringify({name, price: parseFloat(priceStr), stock: parseInt(stockStr,10)})});
    toast('success','Product updated', name);
    await loadProductsFromAPI(); renderApp();
  }catch(e){ toast('error','Could not update product', e.message); }
}
async function adminDeleteProduct(pid){
  const p = getProduct(pid);
  if(!p) return;
  if(!window.confirm(`Delete "${p.name}"? This cannot be undone.`)) return;
  try{
    await apiFetch('/products/'+pid, {method:'DELETE'});
    toast('success','Product deleted', p.name);
    await loadProductsFromAPI(); renderApp();
  }catch(e){ toast('error','Could not delete product', e.message); }
}

function adminInventory(){
  const low = PRODUCTS.filter(p=>p.stock>0 && p.stock<15);
  const out = PRODUCTS.filter(p=>p.stock===0);
  return `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;">
      ${adminStat('Total SKUs', PRODUCTS.length, '', 'up', 'boxes')}
      ${adminStat('Low stock', low.length, '', 'down', 'alert-triangle')}
      ${adminStat('Out of stock', out.length, '', 'down', 'x-circle')}
    </div>
    ${out.length ? `<div class="card" style="padding:20px;margin-bottom:20px;border-color:rgba(122,35,48,0.3);">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;color:#E8919E;">${icon('alert-triangle',16)}<span style="font-weight:600;font-size:13.5px;">Out of stock — restock recommended</span></div>
      ${out.map(p=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid var(--line);"><span style="font-size:13px;">${p.name}</span><button class="btn btn-ghost btn-sm" onclick="toast('success','Restock requested',\`A purchase order draft was created for ${p.name}.\`)">Request restock</button></div>`).join('')}
    </div>`:''}
    <div class="card" style="overflow:hidden;">
      <div style="padding:18px 24px;border-bottom:1px solid var(--line);"><h3 class="serif" style="font-size:16px;">Stock levels</h3></div>
      ${PRODUCTS.map(p=>`
        <div style="display:flex;align-items:center;gap:16px;padding:14px 24px;border-bottom:1px solid var(--line);">
          <img src="${p.images[0]}" style="width:38px;height:38px;border-radius:8px;object-fit:cover;flex:none;">
          <span style="font-size:13px;flex:1;">${p.name}</span>
          <div style="width:140px;height:6px;background:var(--surface-soft);border-radius:4px;overflow:hidden;flex:none;"><div style="height:100%;width:${clamp(p.stock/60*100,2,100)}%;background:${p.stock===0?'#7A2330':p.stock<15?'var(--copper-bright)':'#9FC79A'};"></div></div>
          <span class="mono" style="font-size:12.5px;width:30px;text-align:right;flex:none;">${p.stock}</span>
        </div>`).join('')}
    </div>`;
}

    </tr></thead>
    <tbody>
      ${orders.map((o,i)=>{ const s=STATUS_STYLE[o.status]; const custName = o.customer || (ADMIN_USERS[i%ADMIN_USERS.length]||{}).name || '—';

function adminOrders(){
  const allOrders = ADMIN_ORDERS.length ? ADMIN_ORDERS : [...ORDERS, ...ORDERS.map(o=>({...o,id:o.id+'-A'})), ...ORDERS.map(o=>({...o,id:o.id+'-B'}))];
  return `
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
      ${['All','Processing','Shipped','Delivered'].map((s,i)=>`<button class="badge ${i===0?'badge-copper':'badge-ivory'}" style="cursor:pointer;padding:8px 16px;">${s}</button>`).join('')}
    </div>
    <div class="card" style="overflow:hidden;">${adminOrdersTable(allOrders)}</div>`;
}

              <td style="padding:12px 20px;"><div style="display:flex;align-items:center;gap:12px;"><div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--copper-bright),var(--burgundy));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex:none;">${u.name[0]}</div><div><div style="font-size:13px;font-weight:600;">${u.name}</div><div style="font-size:11px;color:var(--text-faint);">${u.email}</div></div></div></td>
              <td style="padding:12px 20px;"><span class="badge badge-ivory">${u.role}</span></td>
              <td style="padding:12px 20px;font-size:13px;" class="mono">${u.orders}</td>
              <td style="padding:12px 20px;font-size:13px;" class="mono">${fmt(u.spent)}</td>
              <td style="padding:12px 20px;font-size:13px;color:var(--text-dim);" class="mono">${u.joined}</td>
              <td style="padding:12px 20px;"><span class="badge ${u.status==='active'?'badge-success':'badge-burgundy'}">${u.status}</span></td>
              <td style="padding:12px 20px;"><button class="btn-icon" style="width:30px;height:30px;" onclick="adminManageUser('${u.id}', '${u.status}')" aria-label="Manage user">${icon(u.status==='active'?'user-x':'user-check',15)}</button></td>

}
async function adminManageUser(id, currentStatus){
  if(State.user && String(State.user.id)===String(id)){ toast('error','Not allowed','You cannot block your own account.'); return; }
  const nextStatus = currentStatus==='active' ? 'blocked' : 'active';
  if(!window.confirm(`${nextStatus==='blocked'?'Block':'Reactivate'} this user?`)) return;
  try{
    await apiFetch('/admin/users/'+id, {method:'PATCH', body: JSON.stringify({status: nextStatus})});
    toast('success','User updated', `Status set to ${nextStatus}.`);
    await loadAdminUsers(); renderApp();
  }catch(e){ toast('error','Could not update user', e.message); }
}

function adminPromos(){
  return `
    <div style="display:flex;justify-content:flex-end;margin-bottom:20px;">
      <button class="btn btn-primary btn-sm" onclick="adminAddPromo()">${icon('plus',14)} New promo code</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;" class="promo-grid">
      ${PROMO_CODES.map(p=>`
        <div class="card" style="padding:20px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:14px;">
            <span class="mono" style="font-size:16px;font-weight:700;letter-spacing:.03em;">${p.code}</span>
            <span class="badge ${p.active?'badge-success':'badge-ivory'}">${p.active?'Active':'Expired'}</span>
          </div>
          <div style="font-size:13px;color:var(--text-dim);margin-bottom:14px;">
            ${p.type==='percent'?`${p.value}% off order`:p.type==='fixed'?`${fmt(p.value)} off order`:'Free shipping'}
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--text-faint);margin-bottom:8px;">
            <span>Used ${p.uses}${p.limit?` / ${p.limit}`:''}</span><span>${p.expires?`Expires ${p.expires}`:'No expiry'}</span>
          </div>
          ${p.limit?`<div style="height:5px;background:var(--surface-soft);border-radius:4px;overflow:hidden;margin-bottom:14px;"><div style="height:100%;width:${clamp(p.uses/p.limit*100,2,100)}%;background:var(--copper-bright);"></div></div>`:''}
          <button class="btn btn-ghost btn-sm btn-block" onclick="adminTogglePromo(${p.id}, ${p.active})">${p.active?'Deactivate':'Activate'}</button>
        </div>`).join('')}
    </div>`;
}
async function adminAddPromo(){
  const code = window.prompt('Promo code?');
  if(!code) return;
  const type = window.prompt('Type? (percent / fixed / shipping)', 'percent');
  if(!type) return;
  const value = parseFloat(window.prompt('Value? (% or $ amount, 100 for free shipping)', '10')) || 0;
  try{
    await apiFetch('/promos', {method:'POST', body: JSON.stringify({code, type, value, active:true})});
    toast('success','Promo created', code.toUpperCase());
    await loadAdminPromos(); renderApp();
  }catch(e){ toast('error','Could not create promo', e.message); }
}
async function adminTogglePromo(id, active){
  try{
    await apiFetch('/promos/'+id, {method:'PUT', body: JSON.stringify({active: !active})});
    await loadAdminPromos(); renderApp();
  }catch(e){ toast('error','Could not update promo', e.message); }
}

/* ===================== INIT / BOOT ===================== */
function afterRenderHook(){
  // re-attach any per-view listeners if needed in future; currently no-op
}

(function boot(){
  document.documentElement.setAttribute('data-theme', State.theme);
  loadCart();
  loadWishlistLocal();

  async function bootstrapAndRender(){
    await Promise.all([loadCategoriesFromAPI(), loadProductsFromAPI(), restoreSession()]);
    renderApp();
    document.getElementById('app').style.opacity = '1';
    const loader = document.getElementById('loader');
    if(loader){ loader.style.opacity = '0'; loader.style.visibility = 'hidden'; setTimeout(()=>loader.remove(), 650); }
  }

  let bootstrapped = false;
  function startBootstrap(){
    if(bootstrapped) return;
    bootstrapped = true;
    setTimeout(bootstrapAndRender, 600);
  }

  window.addEventListener('load', startBootstrap);
  if(document.readyState === 'complete'){ startBootstrap(); }
})();
</script>
